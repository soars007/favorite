<meta charset="utf-8">
<title>{{ page.title }} | {{ site.title }}</title>
<meta name="author" content="{{ site.author.name }}">
{% if page.keywords %}
  <meta name="keywords" content="{{ page.keywords }}">
{% endif %}
{% if page.description  %}
  <meta name="description " content="{{ page.description  }}">
{% endif %}
<link rel="shortcut icon" href="{{ site.baseurl }}{{ site.favicon }}" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ site.baseurl }}/public/css/bootstrap.css">
<link rel="stylesheet" href="{{ site.baseurl }}/public/css/font-awesome.css">
<link rel="stylesheet" href="{{ site.baseurl }}/public/css/highlight.css">
<link rel="stylesheet" href="{{ site.baseurl }}/public/js/prettify/prettify.css">
<link rel="stylesheet" href="{{ site.baseurl }}/public/css/base.css">
<link href="{{ site.baseurl }}/pages/atom.xml" rel="alternate" title="{{site.title}}" type="application/atom+xml">
<link rel="stylesheet" href="//unpkg.com/heti/umd/heti.min.css">


<!-- MathJax for LaTeX (HTTPS) -->
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    TeX: { equationNumbers: { autoNumber: "AMS" } },
    tex2jax: { inlineMath: [ ['$', '$'], ['$$$', '$$$'], ["\\(","\\)"] ], processEscapes: true }
  });
  MathJax.Hub.Config({ TeX: { extensions: ["autobold.js"] }});
  </script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@2/MathJax.js?config=TeX-AMS-MML_HTMLorMML"></script>

<script src="//unpkg.com/heti/umd/heti-addon.min.js"></script>
<script>
  const heti = new Heti('.heti');
  heti.autoSpacing(); // 自动进行中西文混排美化和标点挤压
  </script>
